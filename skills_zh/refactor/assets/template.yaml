# Output Template (输出模板)

template: |
  # 代码重构报告 (Refactoring)

  ## 1. 重构目标
  [为了什么进行重构？到底想解决代码里的什么毒瘤？]

  ## 2. 影响面评估 (Impact Analysis)
  - **波及的文件**: ...
  - **波及的核心函数/方法**: ...
  - **引发故障风险评估**: 低风险 / 中风险 / 极高风险

  ## 3. 重构行动计划
  | 步骤 | 做了什么动作 | 这样改的原理与好处 |
  |------|--------|-----------|
  | 1    | ...    | ...       |
  | 2    | ...    | ...       |

  ## 4. 重构后的代码展示
  ```diff
  - [又臭又长的老代码]
  + [清爽利落的新代码]
  ```

  ## 5. 行为等效验证 (保证不会改崩)
  - [ ] 存量的单元测试全部能跑通
  - [ ] 对外暴露的公共 API 接口的名称和参数没有改变
  - [ ] 对于相同的入参，重构后的代码能输出完全相同的结果
