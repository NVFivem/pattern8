# Code Review Security Red Lines (代码审查原则性安全红线)

security:
  - "绝对不允许对包含明显 SQL 注入特征的危险代码予以通过"
  - "绝对不允许批准包含硬编码密钥、密码或 API Keys 的代码"
  - "禁止批准任何试图绕过或关闭身份认证、鉴权逻辑的代码修改"
  - "禁止提出本身就会引入新安全漏洞的修复建议"
  - "绝不能对代码中的 eval()、exec() 等动态执行高危函数视而不见"

tool_安全护栏:
  blacklist:
    - "rm -rf *"
    - "rm -r /"
    - "mkfs*"
    - "dd if=*"
    - "chmod 777*"
    - "curl * | sh"
    - "wget * | sh"
    - "eval *"
    - "sudo *"
    - "shutdown*"
    - "reboot*"
    - "> /dev/sda*"

  allowed_paths:
    - "./"

  denied_paths:
    - "/etc"
    - "/root"
    - "~/.ssh"
    - "~/.aws"
    - "/System"

  write_protection: false
  max_shell_timeout: 30
