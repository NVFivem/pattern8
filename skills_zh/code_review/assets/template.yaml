# Output Template (输出模板) — Agent 生成的报告格式必须长这样

template: |
  # 代码审查报告 (Code Review)

  ## 1. 概览总结
  - **审查范围**: [文件名或业务模块]
  - **编程语言**: [列出语言/框架]
  - **终审判决**: ✅ 通过 / ⚠️ 需要修改 / ❌ 直接打回
  - **风险等级**: 低 / 中 / 高 / 严重

  ## 2. 正确性 (Correctness)
  | 发现问题 | 所在行号 | 严重程度 | 修复建议 |
  |-------|------|----------|------------|
  | ...   | ...  | ...      | ...        |

  ## 3. 安全性 (Security)
  | 漏洞情况 | 所在行号 | 严重程度 | 修复方案 |
  |---------------|------|----------|-----|
  | ...           | ...  | ...      | ... |

  ## 4. 性能表现 (Performance)
  | 性能瓶颈 | 所在行号 | 负面影响 | 优化方案 |
  |------------|------|--------|-------------|
  | ...        | ...  | ...    | ...         |

  ## 5. 可维护性 (Maintainability)
  - 代码风格规范: ...
  - 命名规范度: ...
  - 注释完整度: ...
  - 测试覆盖情况: ...

  ## 6. 代码修复示例
  ```diff
  - [原有的瑕疵代码]
  + [修改后的优秀代码]
  ```
