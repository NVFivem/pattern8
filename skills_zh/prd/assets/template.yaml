# Output Template (输出模板) — 生成器 (Generator) **必须**严格遵守的输出格式模具
# 每一份生成的 PRD 都必须长这个样子，以保证输出的专业度和结构一致性。

template: |
  # 产品需求文档 (PRD)

  ## 1. 概述
  [简要的产品愿景与描述]

  ## 2. 目标受众
  [用户画像与受众特征]

  ## 3. 问题陈述
  [这个产品解决了什么痛点？]

  ## 4. 核心功能
  ### 4.1 [功能名称]
  - **描述**: ...
  - **用户故事 (User Story)**: 作为一个 [用户角色]，我希望 [执行某个操作]，以便于 [达成某种业务价值]。
  - **优先级**: P0 / P1 / P2
  - **验收标准 (Acceptance Criteria)**: ...

  ## 5. 非功能性需求
  - 性能表现: ...
  - 安全与隐私: ...
  - 扩展系统: ...

  ## 6. 成功衡量指标
  | 业务指标 | 目标值 | 统计/测量方式 |
  |--------|--------|-------------------|
  | ...    | ...    | ...               |

  ## 7. 交付时间表与里程碑
  | 项目阶段 | 持续时间 | 阶段交付物 |
  |-------|----------|-------------|
  | ...   | ...      | ...         |

  ## 8. 潜在风险与应对策略
  | 风险点 | 影响程度 | 应对/缓解措施 |
  |------|--------|-----------|
  | ...  | ...    | ...       |
