# Guidelines (审计标准) — Reviewer（审查员）进行闭环评估时使用的执法准则
# 以下每一条规则都会用来核对 Agent 的最终输出；一旦违规将立即触发回滚并要求 Agent 重写。

guidelines:
  - "文档必须实打实地包含模板中定义的全部 8 个章节"
  - "每一个核心功能都必须带有一条标准的格式化用户故事: '作为一个...，我希望...，以便于...'"
  - "所有的功能点都必须标注明确的优先级 (P0, P1, 或 P2)"
  - "成功指标必须是可量化的数值，且配有具体的业务目标"
  - "时间表中必须至少切分出 2 个开发或交付里程碑"
  - "至少必须要识别出 2 个潜在风险节点，并给出合理的兜底缓解方案"
  - "非功能性需求板块必须强制涵盖：性能、安全、扩展性 这三大方面"
  - "全篇文案叙述必须具备强烈的专业性，逻辑清晰且没有模棱两可的用词"

# 结构化规则 (由底层的静态引擎强制机器执行)
rules:
  - type: format_verify
    rule: "八大章节结构覆盖率检查"
    format: markdown
    headings:
      - "概述"
      - "目标受众"
      - "问题陈述"
      - "核心功能"

  - type: regex_match
    rule: "纯正的用户故事模板校验"
    pattern: "作为一个.+, 我希望.+以便于.+"
    case_insensitive: true

  - type: length_limit
    rule: "内容充实度最低字符限制"
    min_chars: 500
    min_lines: 30

  - type: regex_exclude
    rule: "禁止存在占位符"
    pattern: "\\[TODO\\]|\\[占位符\\]"
    case_insensitive: true
