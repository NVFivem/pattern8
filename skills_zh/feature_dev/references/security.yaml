# Feature Dev Security Red Lines (特性开发原则性安全红线)

security:
  - "开发新功能时，绝对不允许走捷径绕过全局的身份认证或鉴权系统"
  - "禁止以明文形式存储任何敏感用户数据，必须强制加密"
  - "禁止在线上版本中心化暴露供内部调试用的隐藏后门或调试接口"
  - "绝对不允许在开发中图省事引入已知带有高危漏洞的第三方依赖包"
  - "禁止在任何日志中打印用户的敏感信息 (密码、Tokens、PII个人身份信息)"

tool_安全护栏:
  blacklist:
    - "rm -rf *"
    - "rm -r /"
    - "mkfs*"
    - "dd if=*"
    - "chmod 777*"
    - "curl * | sh"
    - "wget * | sh"
    - "eval *"
    - "sudo *"
    - "shutdown*"
    - "reboot*"
    - "> /dev/sda*"

  allowed_paths:
    - "./"

  denied_paths:
    - "/etc"
    - "/root"
    - "~/.ssh"
    - "~/.aws"
    - "/System"

  write_protection: false
  max_shell_timeout: 30
