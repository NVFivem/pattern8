# Output Template (输出模板)

template: |
  # 缺陷修复报告 (Bug Fix)

  ## 1. 问题识别与定位
  - **异常文件**: [文件路径]
  - **报错行号**: [大概有问题的行数]
  - **错误类型**: [异常类型/表现]
  - **严重程度**: 低 / 中 / 高 / 致命

  ## 2. 根因分析 (Root Cause Analysis)
  [这个 Bug 为什么会发生？它最根本的逻辑漏洞是什么？]

  ## 3. 修复方案策略
  [用 1-2 句话精准概括修复逻辑]

  ## 4. 修复代码
  ```diff
  - [原有的错误代码]
  + [修改后的正确代码]
  ```

  ## 5. 影响面评估 (Impact Analysis)
  - 是否波及其他模块: 是 / 否
  - 需要同步修改的测试用例: ...
  - 是否向后兼容: 是 / 否

  ## 6. 回归验证清单
  - [ ] 确认原本的 Bug 已被修复
  - [ ] 现有的所有单元测试依然 100% 绿灯通过
  - [ ] 已考虑到了极端边界情况 (Edge cases)
